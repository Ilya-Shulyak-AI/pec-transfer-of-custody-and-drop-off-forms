<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PEC TOC">
  <meta name="theme-color" content="#1a4f8a">
  <title>PEC Transfer of Custody</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="base.css?v=2">
  <link rel="stylesheet" href="styles.css?v=8">
  <link rel="stylesheet" href="print.css?v=3" media="print">
  <script defer src="app.js?v=6"></script>
</head>
<body>
<div class="toolbar"><span class="toolbar-label">PEC Transfer of Custody</span><button class="btn btn-new" type="button" data-action="new-form">↺ New</button><button class="btn btn-print" type="button" data-action="print">🖨 Print</button></div>
<div class="validation-banner" id="validationBanner" role="alert"></div>
<main class="page">
<header class="doc-header"><div class="brand-title">Precision E-Cycle</div><div class="brand-subtitle">Transfer of Custody</div><div class="brand-note">Secure IT recycling, electronics recycling, and data destruction documentation</div></header>
<section class="meta-row"><div class="meta-item"><span class="meta-label">TOC Form Number:</span><input type="text" id="tocFormNumber" data-save="true" placeholder="e.g. O-100123" inputmode="text"></div><div class="meta-item"><span class="meta-label">Date:</span><input type="text" id="formDate" data-save="true" placeholder="MM / DD / YYYY" inputmode="text"><button class="today-btn" type="button" data-action="today">Today</button></div></section>
<section class="field-grid fg-2 po-row"><div class="fld full-row"><label for="poNumber">PO #</label><input type="text" id="poNumber" data-save="true" inputmode="text"></div></section>
<section class="sec-header">Transferring Party (From)</section>
<section class="field-grid fg-2"><div class="fld"><label for="fromCompanyName">Company Name</label><input type="text" id="fromCompanyName" data-save="true" inputmode="text"></div><div class="fld"><label for="fromContactName">Contact Name</label><input type="text" id="fromContactName" data-save="true" inputmode="text" autocomplete="name"></div></section>
<section class="field-grid fg-3"><div class="fld"><label for="fromAddress">Address</label><input type="text" id="fromAddress" data-save="true" inputmode="text" autocomplete="street-address"></div><div class="fld"><label for="fromPhone">Phone</label><input type="tel" id="fromPhone" data-save="true" inputmode="tel" autocomplete="tel" placeholder="(___) ___-____" data-format="phone"></div><div class="fld"><label for="fromEmail">Email</label><input type="email" id="fromEmail" data-save="true" inputmode="email" autocomplete="email"></div></section>
<section class="field-grid fg-city"><div class="fld"><label for="fromCity">City</label><input type="text" id="fromCity" data-save="true" inputmode="text" autocomplete="address-level2"></div><div class="fld"><label for="fromState">State</label><input type="text" id="fromState" data-save="true" list="stateOptions" inputmode="text" autocomplete="address-level1" maxlength="2" placeholder="NE" data-format="state"><datalist id="stateOptions"></datalist></div><div class="fld"><label for="fromZip">Zip</label><input type="text" id="fromZip" data-save="true" inputmode="numeric" autocomplete="postal-code" maxlength="10"></div><div class="fld"><label for="transferMethod">Transfer Method</label><select id="transferMethod" data-save="true" data-other-target="transferMethodOtherWrap"><option value="">— Select —</option><option>In-Person</option><option>Shipped</option><option>Dropped Off</option><option>Other</option></select><div class="other-wrap" id="transferMethodOtherWrap"><input type="text" id="transferMethodOther" data-save="true" inputmode="text" placeholder="Specify transfer method…"></div></div></section>
<section class="sec-header mt-small">Receiving Party (To) — Precision E-Cycle</section>
<section class="field-grid fg-2"><div class="fld pre-fill"><label>Company Name</label><input type="text" value="Precision E-Cycle" readonly></div><div class="fld"><label for="receiverContactName">Contact Name</label><input type="text" id="receiverContactName" data-save="true" inputmode="text" autocomplete="name"></div></section>
<section class="field-grid fg-3"><div class="fld pre-fill"><label>Address</label><input type="text" value="4100 Industrial Ave, STE D" readonly></div><div class="fld pre-fill"><label>Phone</label><input type="tel" value="(402) 413-1267" readonly></div><div class="fld pre-fill"><label>Email</label><input type="email" value="info@precisionecycle.com" readonly></div></section>
</main>
</body>
</html>
